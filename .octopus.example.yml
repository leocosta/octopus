# Octopus Configuration
# Copy this file to .octopus.yml in your repo root and customize.
# For user-account scope, place this file at ~/.config/octopus/.octopus.yml
# and set `scope: user` below (see RM-018).

# Install scope (RM-018)
# Values: repo (default) | user
#   repo — configs live in this project (.claude/ in <repo>). Use for
#          project-specific rules, workflow commands, MCP with secrets.
#   user — configs live in ~/.claude/, merged into every CC session on this
#          machine. Use for defaults shared across all your repos.
# Omit the key for repo scope; CC merges user-scope under any repo-scope config.
# scope: user

# Language rules (multi-file, symlinked to .claude/rules/)
# Available: common (always included), csharp, typescript, python
# Note: 'common' is always included automatically
rules:
  - typescript

# Language configuration (optional — AI auto-detects from docs/, git log, and locales/ otherwise)
# Use for new projects with no history or to enforce a specific language explicitly.
# Short form (applies to all artifact types):
# language: en
#
# Per-scope form:
# language:
#   docs: pt-br    # specs, ADRs, RFCs, README
#   code: en       # identifiers (always en), code comments, commit messages, PR descriptions
#   ui: pt-br      # user-facing messages, UI text, app copy

# Skills (symlinked to .claude/skills/)
# Available: audit-all, audit-money, audit-security, audit-tenant, backend-patterns,
#            context-budget, continuous-learning, debug, doc-adr, doc-design, doc-lifecycle,
#            doc-plan, dotnet, implement, launch-feature, launch-release, plan-backlog,
#            review-contracts, review-pr, test-e2e
# skills:
#   - doc-adr
#   - dotnet
#   - test-e2e
#   - doc-lifecycle

# Hooks (injected into .claude/settings.json)
# Options: true (enable all), false (disable), or profile name
# Environment variables:
#   OCTOPUS_DISABLED_HOOKS=hook-id-1,hook-id-2  (disable specific hooks)
# hooks: true

# Which AI agents should be configured?
# Available: claude, copilot, codex, antigravity, opencode
# Use short form for defaults, or long form to override output path:
#   - name: antigravity
#     output: custom/path.md
agents:
  - claude
  - copilot

# Which MCP servers should be configured?
# Available: notion, github, slack, postgres (or any .json file in mcp/)
# Environment variables required per server:
#   notion  — uses OAuth (no env vars needed)
#   github  — GITHUB_TOKEN
#   slack   — SLACK_BOT_TOKEN, SLACK_TEAM_ID
#   postgres — DATABASE_URL
mcp: []

# Enable workflow commands (branch, PR, review, merge)
# Requires: gh (GitHub CLI) >= 2.0 installed and authenticated
# workflow: true

# Pre-push advisory hook — suggests audit skills when pushing code that touches
# sensitive areas (billing, secrets, tenant scope). Advisory only; never blocks.
# Installed automatically when workflow: true and audit skills are present.
# postMergeAuditHook: false  # uncomment to disable

# GitHub reviewers for PRs (used by /octopus:pr-review)
# reviewers:
#   - github-username-1
#   - github-username-2

# Roles/personas (templates from octopus/roles/)
# Available: architect, backend-developer, frontend-developer, marketer, product-manager, writer
# Context is provided via knowledge modules (see knowledge: config below)
# roles:
#   - product-manager
#   - backend-developer

# Knowledge modules — modular domain context for AI agents
# Format A: auto-discover all folders in knowledge/ (not prefixed with _)
# knowledge: true
#
# Format B: explicit list
# knowledge:
#   - domain
#   - architecture
#
# Format C: per-role mapping
# knowledge:
#   modules:
#     - domain
#     - architecture
#     - pricing
#     - retention
#     - analytics
#   roles:
#     backend-developer:
#       - domain
#       - architecture
#     product-manager:
#       - domain
#       - pricing
#       - retention
#       - analytics

# Custom knowledge directory (default: knowledge/)
# knowledge_dir: docs/ai

# Custom project commands
# Each command becomes a slash command with octopus: prefix
# commands:
#   - name: db-reset
#     description: Reset the database (drop, recreate migration, update)
#     run: make db-reset
#   - name: api-start
#     description: Start the API container
#     run: make api-start

# --------------------------------------------------------------------------
# Boris Cherny tips — opt-in Claude Code settings.json passthroughs (RM-011–016)
# Each key below is optional; set only what your team wants standardized.
# --------------------------------------------------------------------------

# RM-011 — Worktree isolation for agent runs
# Signals that this repo tolerates git worktrees for parallel sub-agent work.
# Prerequisite for the /batch skill (RM-017).
# worktree: true

# RM-012 — Auto mode for tool permissions
# Claude Code auto-approves safe tool calls via its AI classifier.
# Values: auto | plan | default | acceptEdits | bypassPermissions
# permissionMode: auto

# RM-013 — Persistent memory + dream subagent
# memory: auto-captures context across sessions.
# dream: schedules the 'dream' subagent to consolidate / prune stale memories.
# memory: true
# dream: true

# RM-014 — Sandbox tool calls
# Runs Claude Code's sandbox for destructive commands (mkdir/rm/etc.).
# sandbox: true

# RM-015 — Output style
# Values: concise | verbose | structured | explanatory
# outputStyle: concise

# RM-016 — Scaffold Claude Code in CI
# Generates .github/workflows/claude.yml for PR review + comment on every PR.
# Requires ANTHROPIC_API_KEY secret in the GitHub repo.
# githubAction: true
