name: Build Release Bundle

on:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Create release archive
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          tar -czf "/tmp/octopus-${TAG}.tar.gz" --exclude .git --exclude .github -C "$GITHUB_WORKSPACE" .
          sha256sum "/tmp/octopus-${TAG}.tar.gz" > "/tmp/octopus-${TAG}.sha256"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          gh release upload "$TAG" \
            "/tmp/octopus-${TAG}.tar.gz" \
            "/tmp/octopus-${TAG}.sha256" \
            install.sh \
            install.ps1
