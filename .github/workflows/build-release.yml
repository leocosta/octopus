name: Build Release Bundle

on:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Download fzf binaries
        shell: bash
        run: |
          FZF_VERSION="v0.72.0"
          FZF_VER="${FZF_VERSION#v}"  # strip leading 'v' for asset filenames
          BASE="https://github.com/junegunn/fzf/releases/download/${FZF_VERSION}"

          mkdir -p bin/fzf/linux-amd64 bin/fzf/linux-arm64 bin/fzf/darwin-amd64 bin/fzf/darwin-arm64 bin/fzf/windows-amd64

          curl -fsSL "${BASE}/fzf-${FZF_VER}-linux_amd64.tar.gz"  | tar -xz -C bin/fzf/linux-amd64 fzf
          curl -fsSL "${BASE}/fzf-${FZF_VER}-linux_arm64.tar.gz"  | tar -xz -C bin/fzf/linux-arm64 fzf
          curl -fsSL "${BASE}/fzf-${FZF_VER}-darwin_amd64.tar.gz" | tar -xz -C bin/fzf/darwin-amd64 fzf
          curl -fsSL "${BASE}/fzf-${FZF_VER}-darwin_arm64.tar.gz" | tar -xz -C bin/fzf/darwin-arm64 fzf
          curl -fsSL "${BASE}/fzf-${FZF_VER}-windows_amd64.zip" -o /tmp/fzf-windows-amd64.zip && unzip -q /tmp/fzf-windows-amd64.zip -d bin/fzf/windows-amd64

          chmod +x bin/fzf/linux-amd64/fzf bin/fzf/linux-arm64/fzf bin/fzf/darwin-amd64/fzf bin/fzf/darwin-arm64/fzf || true
          echo "fzf binaries ready for packaging"

      - name: Create release archive
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          tar -czf "/tmp/octopus-${TAG}.tar.gz" --exclude .git --exclude .github -C "$GITHUB_WORKSPACE" .
          sha256sum "/tmp/octopus-${TAG}.tar.gz" > "/tmp/octopus-${TAG}.sha256"

      # RM-020 — Sign the tarball with the maintainer's GPG key so install.sh
      # can verify integrity via `gpg --verify` (see docs/specs/signed-releases.md).
      # Fails the workflow if secrets are missing to avoid shipping a partial,
      # unsigned release by accident.
      - name: Sign tarball with GPG
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.OCTOPUS_RELEASE_GPG_KEY }}
          GPG_PASSPHRASE: ${{ secrets.OCTOPUS_RELEASE_GPG_PASSPHRASE }}
        run: |
          if [[ -z "${GPG_PRIVATE_KEY:-}" ]]; then
            echo "::error::OCTOPUS_RELEASE_GPG_KEY secret is not configured. See docs/specs/release-signing-pipeline.md for setup."
            exit 1
          fi
          if [[ -z "${GPG_PASSPHRASE:-}" ]]; then
            echo "::error::OCTOPUS_RELEASE_GPG_PASSPHRASE secret is not configured."
            exit 1
          fi

          TAG="${GITHUB_REF##*/}"
          TARBALL="/tmp/octopus-${TAG}.tar.gz"

          # Import the private key into a temporary keyring
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          KEY_ID="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
          if [[ -z "$KEY_ID" ]]; then
            echo "::error::Imported GPG key list is empty."
            exit 1
          fi

          echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 --local-user "$KEY_ID" \
            --detach-sign --armor \
            --output "${TARBALL}.asc" "$TARBALL"

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF##*/}"
          gh release upload "$TAG" \
            "/tmp/octopus-${TAG}.tar.gz" \
            "/tmp/octopus-${TAG}.sha256" \
            "/tmp/octopus-${TAG}.tar.gz.asc" \
            install.sh \
            install.ps1 \
            --clobber
