# Generated by Octopus (guardrails bundle). Delete this file and re-run
# `octopus setup` with `qualityWorkflow: true` in .octopus.yml to regenerate.
#
# Structural quality gate — format, lint, commit message, and test on every
# pull request. Mirrors the same rule set enforced by:
#   - loop-level: hooks/hooks.json (Claude Code)
#   - git-level:  .pre-commit-config.yaml (skill: enforce-precommit)
#
# Edit freely once generated — Octopus does not overwrite this file.

name: Quality

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precommit:
    name: pre-commit (format + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        if: hashFiles('.pre-commit-config.yaml') != ''

  commit-msg:
    name: Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            The subject "{subject}" must start lowercase and not end with a period.

  test:
    name: tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # Stack-specific test invocation — uncomment / adjust per project.
      # The enforce-precommit skill writes pre-commit hooks; this job runs
      # the test suite. Octopus does not assume a test command.
      #
      # Node:    npm ci && npm test
      # Python:  pip install -e .[dev] && pytest
      # Go:      go test ./...
      # .NET:    dotnet test
      # Rust:    cargo test
      - name: Run tests
        run: |
          if [ -f package.json ];   then npm ci && npm test; \
          elif [ -f pyproject.toml ]; then pip install -e .[dev] && pytest; \
          elif [ -f go.mod ];         then go test ./...; \
          elif ls *.csproj 1>/dev/null 2>&1; then dotnet test; \
          elif [ -f Cargo.toml ];     then cargo test; \
          else echo "No recognized stack — edit .github/workflows/quality.yml"; fi
