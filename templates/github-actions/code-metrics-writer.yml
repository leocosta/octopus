# Generated by Octopus (code-metrics skill, part of the quality bundle). Copy this file to
# .github/workflows/code-metrics-writer.yml in the target repo.
#
# Triggered on every push to main (post squash-merge). Recomputes full-repo
# code metrics on the merged commit and writes a single baseline.json
# snapshot to the octopus/code-metrics orphan ref.
#
# NEVER pushes to main, release/*, or any protected branch.
# The orphan ref is written only; the protected tree is never touched.
#
# The baseline is produced by the SAME adapters the local skill uses, via
# `octopus code-metrics --emit-baseline` — there is no metric logic duplicated
# in this YAML, so new metrics (RM-148/149/150 and beyond) are picked up
# automatically with no edit here.
#
# Prerequisites:
#   1. The octopus/code-metrics orphan ref must not be blocked by a
#      catch-all branch-protection rule. If your repo has a `**` rule, add
#      an explicit exception for `octopus/*` refs before enabling this Action.
#   2. Stack-specific tooling must be available in the runner:
#      - C#:  dotnet + dotnet-coverage (global tool) + lizard (pip)
#      - TS:  node + vitest + lizard (pip) + madge (npm)
#   3. The Octopus CLI is cloned into the runner (step below). Override the
#      source with the OCTOPUS_REPO / OCTOPUS_REF env vars if you vendor it.
#   4. GITHUB_TOKEN needs contents:write for the orphan-ref push.
#      The default token works if branch-protection does not block it.
#   5. fetch-depth: 0 — the hotspots metric reads git history (churn).
#
# Edit freely once installed — Octopus does not overwrite this file.

name: Code Metrics Writer

on:
  push:
    branches:
      - main

permissions:
  contents: write  # required to push the orphan ref

concurrency:
  group: code-metrics-writer
  cancel-in-progress: false  # serialized: one writer at a time

env:
  OCTOPUS_REPO: https://github.com/leocosta/octopus
  OCTOPUS_REF: main

jobs:
  write-baseline:
    name: Recompute metrics and write baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hotspots churn needs history
          # Fetch the existing orphan ref so we can overwrite it
          fetch-refs: 'refs/octopus/*'

      # -----------------------------------------------------------------------
      # Stack detection — determines which adapter/tooling to set up
      # -----------------------------------------------------------------------
      - name: Detect stack
        id: stack
        run: |
          if ls *.csproj src/**/*.csproj 2>/dev/null | head -1 | grep -q csproj; then
            echo "name=csharp" >> "$GITHUB_OUTPUT"
          elif [[ -f package.json && (-f tsconfig.json || -n "$(find . -name '*.ts' -not -path '*/node_modules/*' | head -1)") ]]; then
            echo "name=typescript" >> "$GITHUB_OUTPUT"
          else
            echo "name=unknown" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # Common tooling — lizard powers complexity, module_size, param_count,
      # lint_density (denominator) and hotspots (per-file CCN).
      # -----------------------------------------------------------------------
      - name: Install lizard
        run: pip install lizard --quiet

      # -----------------------------------------------------------------------
      # C# tooling
      # -----------------------------------------------------------------------
      - name: Setup .NET
        if: steps.stack.outputs.name == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build C# (so coverage has assemblies)
        if: steps.stack.outputs.name == 'csharp'
        run: dotnet restore && dotnet build --no-restore || true

      - name: Install dotnet-coverage
        if: steps.stack.outputs.name == 'csharp'
        run: dotnet tool install --global dotnet-coverage --ignore-failed-sources
          || dotnet tool update --global dotnet-coverage || true

      # -----------------------------------------------------------------------
      # TypeScript tooling
      # -----------------------------------------------------------------------
      - name: Setup Node
        if: steps.stack.outputs.name == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TS dependencies
        if: steps.stack.outputs.name == 'typescript'
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true

      - name: Install madge
        if: steps.stack.outputs.name == 'typescript'
        run: npm install --global madge 2>/dev/null || npx --yes madge --version 2>/dev/null || true

      # -----------------------------------------------------------------------
      # Compute baseline.json via the shared adapters (single source of truth)
      # -----------------------------------------------------------------------
      - name: Get Octopus CLI
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          git clone --depth 1 --branch "$OCTOPUS_REF" "$OCTOPUS_REPO" /tmp/octopus

      - name: Compute baseline.json
        id: baseline
        if: steps.stack.outputs.name != 'unknown'
        run: |
          export PATH="$HOME/.dotnet/tools:$PATH"
          # The CLI runs the same adapters the local skill uses and prints the
          # flat baseline record. No metric logic is duplicated in this YAML.
          bash /tmp/octopus/cli/octopus.sh code-metrics \
            --stack "${{ steps.stack.outputs.name }}" --emit-baseline > baseline.json
          echo "json=$(cat baseline.json)" >> "$GITHUB_OUTPUT"
          cat baseline.json

      # -----------------------------------------------------------------------
      # Write baseline.json to octopus/code-metrics orphan ref
      # -----------------------------------------------------------------------
      - name: Push baseline to octopus/code-metrics orphan ref
        if: steps.stack.outputs.name != 'unknown'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Safety guard: this step must NEVER push to main, release/*, or any
          # other protected branch. It writes ONLY the orphan ref below.
          TARGET_REF="refs/octopus/code-metrics"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          # Build a minimal tree containing only baseline.json and commit it
          # parented on the existing orphan ref (single overwritten file —
          # minimal fetch payload, no growing log).
          BLOB=$(git hash-object -w baseline.json)
          TREE=$(printf '100644 blob %s\tbaseline.json\n' "$BLOB" | git mktree)
          PARENT=$(git ls-remote origin "$TARGET_REF" | awk '{print $1}' | head -1 || echo "")

          if [[ -n "$PARENT" ]]; then
            COMMIT_SHA=$(git commit-tree "$TREE" -p "$PARENT" \
              -m "chore(metrics): update baseline @ ${{ github.sha }}")
          else
            COMMIT_SHA=$(git commit-tree "$TREE" \
              -m "chore(metrics): init baseline @ ${{ github.sha }}")
          fi

          git push origin "${COMMIT_SHA}:${TARGET_REF}"
          echo "Baseline pushed to ${TARGET_REF}: ${{ steps.baseline.outputs.json }}"
