# Generated by Octopus (quality-metrics bundle). Copy this file to
# .github/workflows/quality-metrics-writer.yml in the target repo.
#
# Triggered on every push to main (post squash-merge). Recomputes full-repo
# quality metrics on the merged commit and writes a single baseline.json
# snapshot to the octopus/quality-metrics orphan ref.
#
# NEVER pushes to main, release/*, or any protected branch.
# The orphan ref is written only; the protected tree is never touched.
#
# Prerequisites:
#   1. The octopus/quality-metrics orphan ref must not be blocked by a
#      catch-all branch-protection rule. If your repo has a `**` rule, add
#      an explicit exception for `octopus/*` refs before enabling this Action.
#   2. Stack-specific tooling must be available in the runner:
#      - C#:  dotnet + coverlet.console + lizard (pip)
#      - TS:  node + vitest + lizard (pip) + madge (npm)
#   3. GITHUB_TOKEN needs contents:write for the orphan-ref push.
#      The default token works if branch-protection does not block it.
#
# Edit freely once installed — Octopus does not overwrite this file.

name: Quality Metrics Writer

on:
  push:
    branches:
      - main

permissions:
  contents: write  # required to push the orphan ref

concurrency:
  group: quality-metrics-writer
  cancel-in-progress: false  # serialized: one writer at a time

jobs:
  write-baseline:
    name: Recompute metrics and write baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Fetch the existing orphan ref so we can overwrite it
          fetch-refs: 'refs/octopus/*'

      # -----------------------------------------------------------------------
      # Stack detection — determines which adapter to run
      # -----------------------------------------------------------------------
      - name: Detect stack
        id: stack
        run: |
          if ls *.csproj src/**/*.csproj 2>/dev/null | head -1 | grep -q csproj; then
            echo "name=csharp" >> "$GITHUB_OUTPUT"
          elif [[ -f package.json && (-f tsconfig.json || -n "$(find . -name '*.ts' -not -path '*/node_modules/*' | head -1)") ]]; then
            echo "name=typescript" >> "$GITHUB_OUTPUT"
          else
            echo "name=unknown" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------------
      # Common tooling
      # -----------------------------------------------------------------------
      - name: Install lizard (complexity + module size)
        run: pip install lizard --quiet

      # -----------------------------------------------------------------------
      # C# adapter
      # -----------------------------------------------------------------------
      - name: Setup .NET
        if: steps.stack.outputs.name == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install coverlet.console
        if: steps.stack.outputs.name == 'csharp'
        run: dotnet tool install --global coverlet.console --ignore-failed-sources || true

      - name: C# — run coverage (coverlet → Cobertura)
        if: steps.stack.outputs.name == 'csharp'
        id: csharp_coverage
        run: |
          dotnet test --no-build --collect:"XPlat Code Coverage" \
            --results-directory ./coverage_results \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
            2>/dev/null || true
          COV_FILE=$(find ./coverage_results -name 'coverage.cobertura.xml' | head -1)
          if [[ -f "$COV_FILE" ]]; then
            RATE=$(awk -F'"' '/line-rate=/ && /package/ {sum+=$2; n++} END{if(n>0) printf "%.1f", sum/n*100; else print "0"}' "$COV_FILE")
          else
            RATE="0"
          fi
          echo "value=$RATE" >> "$GITHUB_OUTPUT"

      - name: C# — cyclomatic complexity + module size (lizard)
        if: steps.stack.outputs.name == 'csharp'
        id: csharp_lizard
        run: |
          OUTPUT=$(lizard . --languages cs -C 1000 -L 100000 -E 0 2>/dev/null || true)
          COMPLEXITY=$(echo "$OUTPUT" | awk '/^Average cyclomatic/ {print $NF}' | head -1)
          MOD_SIZE=$(echo "$OUTPUT" | awk '/^Average nloc/ {print $NF}' | head -1)
          echo "complexity=${COMPLEXITY:-0}" >> "$GITHUB_OUTPUT"
          echo "module_size=${MOD_SIZE:-0}" >> "$GITHUB_OUTPUT"

      - name: C# — dependency cycles (dotnet list reference)
        if: steps.stack.outputs.name == 'csharp'
        id: csharp_deps
        run: |
          # Build a project-reference adjacency list and detect cycles using DFS.
          # This covers project-to-project cycles (assembly-level). Package cycles
          # are not detected in v1 (no free C# equivalent of madge for NuGet graphs).
          python3 - <<'PYEOF'
          import subprocess, sys, re, os

          projs = []
          for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if d not in ['bin','obj','.git','node_modules']]
            for f in files:
              if f.endswith('.csproj'):
                projs.append(os.path.join(root, f))

          graph = {}
          for p in projs:
            name = os.path.splitext(os.path.basename(p))[0]
            try:
              out = subprocess.check_output(
                ['dotnet', 'list', p, 'reference'], text=True, stderr=subprocess.DEVNULL)
              refs = re.findall(r'([A-Za-z0-9._-]+)\.csproj', out)
              graph[name] = refs
            except Exception:
              graph[name] = []

          # Tarjan's SCC — count components with >1 node or self-loop
          index_counter = [0]
          stack = []
          lowlink = {}
          index = {}
          on_stack = {}
          scc_count = [0]

          def strongconnect(v):
            index[v] = index_counter[0]; lowlink[v] = index_counter[0]
            index_counter[0] += 1
            stack.append(v); on_stack[v] = True
            for w in graph.get(v, []):
              if w not in index:
                strongconnect(w)
                lowlink[v] = min(lowlink[v], lowlink.get(w, lowlink[v]))
              elif on_stack.get(w):
                lowlink[v] = min(lowlink[v], index[w])
            if lowlink[v] == index[v]:
              scc = []
              while True:
                w = stack.pop(); on_stack[w] = False; scc.append(w)
                if w == v: break
              if len(scc) > 1:
                scc_count[0] += 1

          for v in list(graph.keys()):
            if v not in index:
              strongconnect(v)

          print(scc_count[0])
          PYEOF
          CYCLES=$(python3 -c "
          import subprocess, sys, re, os

          projs = []
          for root, dirs, files in os.walk('.'):
            dirs[:] = [d for d in dirs if d not in ['bin','obj','.git','node_modules']]
            for f in files:
              if f.endswith('.csproj'):
                projs.append(os.path.join(root, f))

          graph = {}
          for p in projs:
            name = os.path.splitext(os.path.basename(p))[0]
            try:
              out = subprocess.check_output(
                ['dotnet', 'list', p, 'reference'], text=True, stderr=subprocess.DEVNULL)
              refs = re.findall(r'([A-Za-z0-9._-]+)\.csproj', out)
              graph[name] = refs
            except Exception:
              graph[name] = []

          index_counter = [0]
          stack = []
          lowlink = {}
          index = {}
          on_stack = {}
          scc_count = [0]

          def strongconnect(v):
            index[v] = index_counter[0]; lowlink[v] = index_counter[0]
            index_counter[0] += 1
            stack.append(v); on_stack[v] = True
            for w in graph.get(v, []):
              if w not in index:
                strongconnect(w)
                lowlink[v] = min(lowlink[v], lowlink.get(w, lowlink[v]))
              elif on_stack.get(w):
                lowlink[v] = min(lowlink[v], index[w])
            if lowlink[v] == index[v]:
              scc = []
              while True:
                w = stack.pop(); on_stack[w] = False; scc.append(w)
                if w == v: break
              if len(scc) > 1:
                scc_count[0] += 1

          for v in list(graph.keys()):
            if v not in index:
              strongconnect(v)

          print(scc_count[0])
          " 2>/dev/null || echo "0")
          echo "value=${CYCLES:-0}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # TypeScript adapter
      # -----------------------------------------------------------------------
      - name: Setup Node
        if: steps.stack.outputs.name == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install TS dependencies
        if: steps.stack.outputs.name == 'typescript'
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true

      - name: TS — run coverage (vitest → LCOV)
        if: steps.stack.outputs.name == 'typescript'
        id: ts_coverage
        run: |
          npx vitest run --coverage --reporter=verbose 2>/dev/null || true
          LCOV_FILE=$(find . -name 'lcov.info' -not -path '*/node_modules/*' | head -1)
          if [[ -f "$LCOV_FILE" ]]; then
            RATE=$(awk '
              /^LH:/ { lh += substr($0,4) }
              /^LF:/ { lf += substr($0,4) }
              END { if (lf>0) printf "%.1f", lh/lf*100; else print "0" }
            ' "$LCOV_FILE")
          else
            RATE="0"
          fi
          echo "value=$RATE" >> "$GITHUB_OUTPUT"

      - name: TS — cyclomatic complexity + module size (lizard)
        if: steps.stack.outputs.name == 'typescript'
        id: ts_lizard
        run: |
          OUTPUT=$(lizard . --languages javascript --exclude "*/node_modules/*" \
            -C 1000 -L 100000 -E 0 2>/dev/null || true)
          COMPLEXITY=$(echo "$OUTPUT" | awk '/^Average cyclomatic/ {print $NF}' | head -1)
          MOD_SIZE=$(echo "$OUTPUT" | awk '/^Average nloc/ {print $NF}' | head -1)
          echo "complexity=${COMPLEXITY:-0}" >> "$GITHUB_OUTPUT"
          echo "module_size=${MOD_SIZE:-0}" >> "$GITHUB_OUTPUT"

      - name: Install madge
        if: steps.stack.outputs.name == 'typescript'
        run: npm install --global madge 2>/dev/null || npx --yes madge --version 2>/dev/null || true

      - name: TS — dependency cycles (madge)
        if: steps.stack.outputs.name == 'typescript'
        id: ts_deps
        run: |
          ENTRY=$(find . -name 'index.ts' -not -path '*/node_modules/*' | head -1 || \
                  find . -name 'main.ts'  -not -path '*/node_modules/*' | head -1 || \
                  echo ".")
          CYCLES=$(madge --circular --extensions ts,js "$ENTRY" 2>/dev/null | \
            grep -c "→\|->") || CYCLES=0
          echo "value=${CYCLES:-0}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Write baseline.json to octopus/quality-metrics orphan ref
      # -----------------------------------------------------------------------
      - name: Assemble baseline.json
        id: baseline
        run: |
          COMMIT="${{ github.sha }}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          STACK="${{ steps.stack.outputs.name }}"

          if [[ "$STACK" == "csharp" ]]; then
            COVERAGE="${{ steps.csharp_coverage.outputs.value }}"
            COMPLEXITY="${{ steps.csharp_lizard.outputs.complexity }}"
            MODULE_SIZE="${{ steps.csharp_lizard.outputs.module_size }}"
            DEP_CYCLES="${{ steps.csharp_deps.outputs.value }}"
          elif [[ "$STACK" == "typescript" ]]; then
            COVERAGE="${{ steps.ts_coverage.outputs.value }}"
            COMPLEXITY="${{ steps.ts_lizard.outputs.complexity }}"
            MODULE_SIZE="${{ steps.ts_lizard.outputs.module_size }}"
            DEP_CYCLES="${{ steps.ts_deps.outputs.value }}"
          else
            echo "Unsupported stack '$STACK' — skipping baseline write" >&2
            exit 0
          fi

          JSON="{\"commit\":\"${COMMIT}\",\"timestamp\":\"${TIMESTAMP}\",\"coverage\":${COVERAGE:-0},\"complexity\":${COMPLEXITY:-0},\"module_size\":${MODULE_SIZE:-0},\"dependency_cycles\":${DEP_CYCLES:-0}}"
          echo "$JSON" > baseline.json
          echo "json=$JSON" >> "$GITHUB_OUTPUT"
          cat baseline.json

      - name: Push baseline to octopus/quality-metrics orphan ref
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Safety guard: this step must NEVER push to main, release/*, or any
          # other protected branch. It writes ONLY the orphan ref below.
          TARGET_REF="refs/octopus/quality-metrics"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          # Create or reset a worktree pointing at the orphan ref.
          # We use a detached commit so the orphan ref history is a single
          # overwritten file — minimal fetch payload, no growing log.
          TMPDIR_WK=$(mktemp -d)
          cp baseline.json "$TMPDIR_WK/baseline.json"

          TREE=$(git hash-object -w --stdin < baseline.json | xargs -I{} \
            git write-tree --prefix= 2>/dev/null || true)

          # Build a minimal tree with just baseline.json
          BLOB=$(git hash-object -w "$TMPDIR_WK/baseline.json")
          TREE=$(printf '100644 blob %s\tbaseline.json\n' "$BLOB" | git mktree)
          PARENT=$(git ls-remote origin "$TARGET_REF" | awk '{print $1}' | head -1 || echo "")

          if [[ -n "$PARENT" ]]; then
            COMMIT_SHA=$(git commit-tree "$TREE" -p "$PARENT" \
              -m "chore(metrics): update baseline @ ${{ github.sha }}")
          else
            COMMIT_SHA=$(git commit-tree "$TREE" \
              -m "chore(metrics): init baseline @ ${{ github.sha }}")
          fi

          git push origin "${COMMIT_SHA}:${TARGET_REF}"
          rm -rf "$TMPDIR_WK"
          echo "Baseline pushed to ${TARGET_REF}: ${{ steps.baseline.outputs.json }}"
