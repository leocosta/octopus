name: kilocode
output: .kilocode/rules.md
content_mode: concatenate

capabilities:
  native_rules: false
  native_skills: false
  native_hooks: false
  native_commands: true
  native_agents: false
  native_mcp: false

delivery:
  commands:
    method: file_per_command
    target: .kilo/command/
    prefix: ""

gitignore_extra:
  - .kilo/command/
