name: copilot
output: .github/copilot-instructions.md
content_mode: concatenate

capabilities:
  native_rules: true
  native_skills: false
  native_hooks: false
  native_commands: false
  native_prompt_files: true
  native_agents: false
  native_mcp: true
  native_knowledge: false

delivery:
  rules:
    method: symlink
    target: .github/instructions/
    instructions_ext: true
  commands:
    method: prompt_files
    target: .github/prompts/
    prefix: octopus-
    # RM-159: a SELECTED subset of workflow commands is also delivered as Copilot
    # CLI custom agents (.github/agents/<prefix><name>.agent.md), invocable from
    # the terminal via `copilot --agent=octopus-<name>`. Prompt files (above) stay
    # IDE-only; this closes the CLI gap for terminal-driven workflows. Keep the
    # list tight — only commands worth running from a shell — and the names must
    # match commands/<name>.md without colliding with role agents.
    cli_agents_target: .github/agents/
    cli_agents_select: dev-flow,implement,debug,commit,branch-create,codereview,pr-open,pr-review,pr-comments,pr-merge,release
  mcp:
    method: vscode_json
    target: .vscode/mcp.json

mcp_extra:
  - method: copilot_cli
    target: ~/.copilot/mcp-config.json

gitignore_extra:
  - .github/prompts/
  - .github/agents/
