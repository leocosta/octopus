name: copilot
output: .github/copilot-instructions.md
content_mode: concatenate

capabilities:
  native_rules: true
  native_skills: false
  native_hooks: false
  native_commands: false
  native_prompt_files: true
  native_agents: false
  native_mcp: true
  native_knowledge: false

delivery:
  rules:
    method: symlink
    target: .github/instructions/
    instructions_ext: true
  commands:
    method: prompt_files
    target: .github/prompts/
    prefix: octopus-
  mcp:
    method: vscode_json
    target: .vscode/mcp.json

mcp_extra:
  - method: copilot_cli
    target: ~/.copilot/mcp-config.json

gitignore_extra:
  - .github/prompts/
