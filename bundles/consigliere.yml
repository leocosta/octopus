name: consigliere
description: The manager's private chief-of-staff kit — a personal knowledge workspace that digests diverse inputs (meeting transcripts, Slack, Jira, Confluence) into living, grounded memory organized by perennial contexts and cross-cutting projects. Where tech-lead multiplies the team, consigliere multiplies the manager themselves. All managerial data lives in a private workspace (never a team repo, ADR-007); kept separate from tech-lead by audience, data and activation context (ADR-008). RM-099 ships the scaffold; digest-source, context-status, playbook-review and the consigliere role land in RM-100…103.
category: intent
persona_question: "Do you want a private chief-of-staff that digests your meetings and documents into living, grounded memory you can track and query?"
persona_default: false
skills:
  - consigliere-bootstrap     # RM-099 — scaffold the private manager-workspace + write-guard
  - digest-source             # RM-100 — capture: snapshot → route → grounded 6-field digest → fan-out
  - context-status            # RM-102 — read-only NL consult over the materialized state
  - playbook-review           # RM-103 — curate the heuristics loop: promote proposals, seed directly
  - consigliere-connect-atlassian  # RM-104 — one-time OAuth setup: read-only Jira + Confluence
  - consigliere-lens          # RM-110 — reframe the knowledge engines through the consigliere lens (read-only)
roles:
  - consigliere               # RM-101 — the lens/voice: political-risk read, heuristics push/pull
rules: []
mcp: []
# hooks: null — the scaffold forces no hooks; grounding is enforced by the
# write-guard contract in consigliere-bootstrap and (for digests) audit-grounding.
hooks: null
